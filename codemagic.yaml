workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini
    max_build_duration: 120
    environment:
      ios: latest
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_VERSION: 3.16.0
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/miniconda/envs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-app/release/app-release.apk
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - $PERSONAL_EMAIL
