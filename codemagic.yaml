workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: 3.16.0
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-app/release/app-release.apk
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - courtney.enright@icloud.com
