name: sales_tracker
description: A Flutter app to track daily sales with items, units, and values.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.2.8
  path: ^1.8.3
  intl: ^0.18.1
  csv: ^5.1.1
  file_picker: ^5.3.1
  table_calendar: ^3.0.8
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
